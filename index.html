<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>企画案ジェネレーター｜NextFeed</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #0f172a;
  color: #fff;
}

/* ナビ */
.nav {
  padding: 15px 20px;
}

.nav a {
  color: #38bdf8;
  text-decoration: none;
  font-size: 14px;
}

/* メイン */
.container {
  max-width: 800px;
  margin: 50px auto;
  text-align: center;
}

/* タイトル */
h1 {
  font-size: 28px;
  margin-bottom: 10px;
}

.desc {
  color: #94a3b8;
  margin-bottom: 30px;
}

/* カード */
.card {
  background: #1e293b;
  padding: 25px;
  border-radius: 12px;
}

/* 入力 */
select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  background: #0f172a;
  color: #fff;
}

/* ボタン */
button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border: none;
  border-radius: 8px;
  background: #38bdf8;
  color: #000;
  font-size: 16px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  opacity: 0.9;
}

/* 結果 */
.result {
  margin-top: 25px;
  text-align: left;
  background: #020617;
  padding: 20px;
  border-radius: 10px;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="nav">
  <a href="/">← トップへ戻る</a>
</div>

<div class="container">

  <h1>企画案ジェネレーター</h1>
  <p class="desc">条件に合った“使える配信企画”を生成します</p>

  <div class="card">

    <!-- ▼ここ変更 -->
    <select id="mood">
      <option value="ゆるい">ゆるい</option>
      <option value="攻め">攻め</option>
    </select>

    <select id="type">
      <option value="参加型">参加型</option>
      <option value="討論">討論</option>
      <option value="検証">検証</option>
      <option value="ロールプレイ">ロールプレイ</option>
      <option value="縛り">縛り</option>
    </select>

    <button onclick="generate()">生成する</button>

    <div class="result" id="output"></div>

  </div>

</div>

<script>

// ▼企画データ（ここ増やしてOK）
const projects = [
  { title: "リスナーの黒歴史を読み上げて成仏させる会", category: "参加型", mood: "攻め", strength: 5 },
  { title: "視聴者の限界飯をガチ採点してみた", category: "参加型", mood: "ゆるい", strength: 5 },
  { title: "リスナーのスマホホーム画面チェック", category: "参加型", mood: "攻め", strength: 5 },
  { title: "1億円もらえるけど〇〇禁止、どこまで許せる？", category: "討論", mood: "ゆるい", strength: 5 },
  { title: "朝シャンvs夜シャン討論", category: "討論", mood: "ゆるい", strength: 4 },
  { title: "利きコーラチャレンジ", category: "検証", mood: "ゆるい", strength: 4 },
  { title: "激辛ペヤング無表情チャレンジ", category: "検証", mood: "攻め", strength: 5 },
  { title: "スナックのママになって愚痴を聞く", category: "ロールプレイ", mood: "ゆるい", strength: 5 },
  { title: "教祖になってリスナーを洗脳する配信", category: "ロールプレイ", mood: "攻め", strength: 5 },
  { title: "語尾ニャン縛りで1時間配信", category: "縛り", mood: "ゆるい", strength: 4 },
  { title: "英語禁止雑談チャレンジ", category: "縛り", mood: "攻め", strength: 5 }
];

// ▼生成ロジック
function generate() {

  const mood = document.getElementById("mood").value;
  const type = document.getElementById("type").value;

  const filtered = projects
    .filter(p => p.mood === mood && p.category === type)
    .sort((a, b) => b.strength - a.strength);

  if (filtered.length === 0) {
    document.getElementById("output").innerText = "該当する企画がありません";
    return;
  }

  // 上位からランダムで3つ
  const picks = filtered.slice(0, 5).sort(() => 0.5 - Math.random()).slice(0, 3);

  let result = "";

  picks.forEach((p, i) => {
    result += `
【企画${i + 1}】
${p.title}

【ポイント】
・コメントが伸びやすい
・配信で即使える

----------------------
`;
  });

  document.getElementById("output").innerText = result;
}

</script>

</body>
</html>
