<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>企画案ジェネレーター｜NextFeed</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #0f172a;
  color: #fff;
}

/* ナビ */
.nav {
  padding: 15px 20px;
}

.nav a {
  color: #38bdf8;
  text-decoration: none;
  font-size: 14px;
}

/* メイン */
.container {
  max-width: 800px;
  margin: 50px auto;
  text-align: center;
}

/* タイトル */
h1 {
  font-size: 28px;
  margin-bottom: 10px;
}

.desc {
  color: #94a3b8;
  margin-bottom: 30px;
}

/* カード */
.card {
  background: #1e293b;
  padding: 25px;
  border-radius: 12px;
}

/* 入力 */
select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  background: #0f172a;
  color: #fff;
}

/* ボタン */
button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border: none;
  border-radius: 8px;
  background: #38bdf8;
  color: #000;
  font-size: 16px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  opacity: 0.9;
}

/* 結果 */
.result {
  margin-top: 25px;
  text-align: left;
  background: #020617;
  padding: 20px;
  border-radius: 10px;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="nav">
  <a href="/">← トップへ戻る</a>
</div>

<div class="container">

  <h1>企画案ジェネレーター</h1>
  <p class="desc">トレンドを元に、今伸びる企画案を自動生成します</p>

  <div class="card">

    <select id="genre">
      <option>雑談</option>
      <option>VTuber</option>
    </select>

    <select id="character">
      <option>元気</option>
      <option>落ち着き</option>
    </select>

    <select id="style">
      <option>参加型</option>
      <option>トーク</option>
    </select>

    <button onclick="generate()">生成する</button>

    <div class="result" id="output"></div>

  </div>

</div>

<script>
function generate() {

  const trends = [
    "最近の出来事",
    "SNSで話題",
    "リスナーあるある",
    "配信裏話"
  ];

  const formats = [
    "実は○○だった",
    "○○ランキング",
    "○○してみた",
    "○○あるある"
  ];

  const trend = trends[Math.floor(Math.random() * trends.length)];
  const format = formats[Math.floor(Math.random() * formats.length)];

  const title = `${trend}の${format}`;

  const result = `
【企画タイトル】
${title}

【配信の流れ】
1. 導入
2. 企画説明
3. メイン
4. コメント拾い
5. 締め

【コメント誘導】
「みんなはどう思う？」
「コメントで教えて！」

【伸びる理由】
・共感でコメントが増える
・参加型で離脱防止

【サムネ案】
・大文字＋強ワード
`;

  document.getElementById("output").innerText = result;
}
</script>

</body>
</html>
